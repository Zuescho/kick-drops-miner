services:
  kick-drops-miner:
    # Use the published image, or `build: .` to build locally.
    image: ghcr.io/zuescho/kick-drops-miner:latest
    # build: .
    container_name: kick-drops-miner
    volumes:
      - ./config:/config          # holds config.json, cookies/, chrome_data/
    environment:
      - TZ=Europe/Berlin
      # Channels can come from config.json OR this env (url or url=minutes):
      # - KDM_CHANNELS=https://kick.com/some-streamer=120, https://kick.com/another=60
      # - KDM_HEADLESS=0          # 0 = headful under Xvfb (most robust). 1 = true headless.
      # - KDM_LOG_LEVEL=INFO
    # Chromium needs a reasonable amount of shared memory.
    shm_size: "1gb"
    restart: unless-stopped
